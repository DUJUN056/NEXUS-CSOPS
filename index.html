<!DOCTYPE html>
<html lang="en" data-theme="nika">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0,
             maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0d0d" />
  <meta name="apple-mobile-web-app-capable"
    content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style"
    content="black-translucent" />

  <title>NEXUS — CS Operations</title>

  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />

  <!-- Styles -->
  <link rel="stylesheet" href="src/styles/style1.css" />
  <link rel="stylesheet" href="src/styles/themes-live.css" />
  <link rel="stylesheet" href="src/styles/style2.css" />

  <style>
    /* Critical inline styles */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html {
      scroll-behavior: smooth;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont,
        "Segoe UI", Roboto, "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #root {
      min-height: 100vh;
    }
    /* Initial loading flash prevention */
    html[data-theme="nika"] body {
      background: #0d0d0d;
    }
    html[data-theme="zoro"] body {
      background: #0a0a0a;
    }
    html[data-theme="porsche"] body {
      background: #0f0f0f;
    }
    html[data-theme="raptor"] body {
      background: #0c0c0c;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- React 18 -->
  <script crossorigin
    src="https://unpkg.com/react@18/umd/react.production.min.js">
  </script>
  <script crossorigin
    src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js">
  </script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js">
  </script>

  <!-- XLSX (for Excel upload) -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js">
  </script>

  <!-- App Files -->
  <script src="src/lib/config.js"></script>
  <script src="src/components/components.js"></script>
  <script src="src/screens/screens1.js"></script>
  <script src="src/screens/screens2.js"></script>
  <script src="src/screens/screens3.js"></script>
  <script src="src/screens/screens4.js"></script>
  <script src="src/app.js"></script>

</body>
</html>
